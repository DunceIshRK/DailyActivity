<!DOCTYPE html>
<html lang="en">
<head>
    <title>DS Daily Activity Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; --success: #166534; --danger: #991b1b; --whatsapp: #075e54; }
        * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text); }
        
        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; position: sticky; top: 0; z-index: 100; background: var(--bg); padding-bottom: 10px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; background: #e2e8f0; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        .tab-content { display: none; max-width: 100%; margin: auto; }
        .tab-content.active { display: block; }
        /* Cards & Form */
        .section-card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        h3 { margin: 0 0 15px 0; color: var(--primary); font-size: 1rem; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; }
        .deadline-badge { background: #fee2e2; color: #991b1b; font-size: 0.75rem; padding: 4px 10px; border-radius: 6px; float: right; font-weight: bold; }
        label { display: block; margin-top: 14px; font-weight: 700; font-size: 0.9rem; color: #475569; }
        input, select { width: 100%; padding: 14px; margin-top: 6px; border: 1.5px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; font-size: 16px; background: #fff; }
        button#submitBtn { width: 50%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.2); display: block; margin: 0 auto; }
        
        /* Dashboard Header Controls */
        .db-controls { display: flex; gap: 15px; margin-bottom: 15px; align-items: flex-end; flex-wrap: wrap; }
        .export-btn { flex: 2; padding: 16px; background: var(--whatsapp); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: all 0.2s;}
        .filter-group { flex: 1; min-width: 250px; }
        .filter-group label { margin-top: 0; margin-bottom: 5px; font-size: 0.8rem; text-transform: uppercase; color: #64748b; }
        .filter-group select { padding: 14px; background: white; border: 2px solid var(--primary); color: var(--primary); font-weight: bold; }
        /* Table UI */
        #capture-area { padding: 30px; background: white; border-radius: 20px; width: fit-content; }
        .table-wrapper { overflow: auto; max-height: 75vh; background: white; border-radius: 14px; border: 1px solid #e2e8f0; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        table { border-collapse: separate; border-spacing: 0; font-size: 12px; line-height: 1.5; } 
        th { background: #f1f5f9; padding: 14px 12px; text-align: left; border-bottom: 2.5px solid #e2e8f0; white-space: nowrap; border-right: 1px solid #e2e8f0; color: #334155; font-weight: 800; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; white-space: nowrap; border-right: 1px solid #f1f5f9; background: white; }
        
        /* Monospace Store Column */
        td:first-child { position: sticky; left: 0; z-index: 5; border-right: 3px solid #e2e8f0; }
        td:first-child .badge { font-size: 14px; padding: 8px 12px; letter-spacing: 2px; font-family: "Consolas", "SF Mono", "Monaco", monospace; }
        /* Sticky Headers */
        #groupHead th { position: sticky; top: 0; z-index: 10; height: 42px; box-sizing: border-box; }
        #masterHead th { position: sticky; top: 42px; z-index: 9; height: 48px; box-sizing: border-box; background: #f1f5f9; }
        #groupHead th:first-child { position: sticky; left: 0; top: 0; z-index: 12; background: white; border-right: 3px solid #e2e8f0; }
        #masterHead th:first-child { position: sticky; left: 0; top: 42px; z-index: 11; background: #f1f5f9; border-right: 3px solid #e2e8f0; }
        .group-header { text-align: center; font-size: 13px; font-weight: 900; letter-spacing: 1px; border-bottom: 3px solid white !important; border-right: 2px solid white; padding: 10px !important; }
        /* Badge Styling */
        .badge { padding: 6px 10px; border-radius: 8px; font-weight: 800; font-size: 10px; display: inline-block; letter-spacing: 0.5px; }
        .bg-done { background: #dcfce7; color: var(--success); border: 1px solid #bbf7d0; }
        .bg-pending { background: #fee2e2; color: var(--danger); border: 1px solid #fecaca; }
        .badge-id { background: #eff6ff; color: var(--primary); border: 1px solid #dbeafe; }
        /* Make tel links look like badges */
        a.badge-id, a.badge {
            text-decoration: none;
            color: inherit;
        }
        /* Store name below code — inline for html2canvas compatibility */
        .store-name {
            display: inline;          /* NOT block, so canvas captures it */
            font-size: 9px;
            font-weight: 400;
            letter-spacing: 0.3px;
            color: #64748b;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        #adminControls { display: none; margin-bottom: 20px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        
        /* Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 320px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .modal-content input { width: 100%; padding: 12px; margin: 15px 0; border: 1.5px solid #cbd5e1; border-radius: 8px; font-size: 16px; box-sizing: border-box; text-align: center; letter-spacing: 4px; font-family: monospace; }
        .modal-buttons { display: flex; gap: 10px; }
        .modal-buttons button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-cancel { background: #e2e8f0; color: #475569; }
        .btn-submit { background: var(--primary); color: white; }
    </style>
</head>
<body>
<div id="passwordModal" class="modal-overlay">
    <div class="modal-content">
        <h3 style="border-bottom:none; margin-bottom: 5px;">Admin Access</h3>
        <p style="margin-top:0; font-size: 14px; color: #64748b;">Enter passcode for Historical Data</p>
        <input type="password" id="adminPasscode" placeholder="••••••••">
        <div class="modal-buttons">
            <button class="btn-cancel" onclick="closePasswordModal()">Cancel</button>
            <button class="btn-submit" onclick="submitPassword()">Unlock</button>
        </div>
    </div>
</div>
<div class="tabs">
    <button class="tab-btn active" id="btn-form" onclick="showTab('form')">ENTRY FORM</button>
    <button class="tab-btn" id="btn-today" onclick="showTab('db', 'today')">TODAY'S DASHBOARD</button>
    <button class="tab-btn" id="btn-admin" style="background-color: #f1f5f9; color: var(--danger);" onclick="checkAccessAndShow()">🔒 HISTORICAL (ADMIN)</button>
</div>
<div id="form" class="tab-content active">
    <form id="storeForm">
        <div class="section-card">
            <h3>Store Selection</h3>
            <select name="store" required id="storeDropdown">
                <option value="">-- Choose Store --</option>
                <option>TM6N</option><option>TM4T</option><option>TM6M</option><option>T9W3</option>
                <option>T9T3</option><option>T9V5</option><option>T3GC</option><option>TM6O</option>
                <option>T9T7</option><option>TM4Z</option><option>TM3J</option><option>TM5C</option>
                <option>TN1B</option><option>TK5T</option><option>TN1T</option><option>T9H8</option>
                <option>TM8T</option><option>TN1C</option><option>TBAE</option><option>U2JH</option>
                <option>U1WR</option><option>U949</option><option>FRVE</option><option>U286</option>
                <option>U1WP</option><option>2314</option><option>3035</option><option>3087</option>
                <option>F1ZP</option><option>U1L2</option><option>U14V</option><option>TNI6</option>
                <option>U086</option><option>U1OW</option><option>TKM7</option>
            </select>
        </div>
        <div class="section-card">
            <span class="deadline-badge">10 AM</span>
            <h3>Deadline : 10 AM</h3>
            <label>RMS</label><select name="rms"><option value="">Pending</option><option>Done</option></select>
            <label>On Shelf Availability Morning</label><select name="osaMorning"><option value="">Pending</option><option>Done</option></select>
            <label>EMS Portal Entry</label><select name="emsPortal"><option value="">Pending</option><option>Done</option></select>
            <label>AI Count Correction (Doc No)</label><input type="text" name="aiCount">
            <label>JM Count Correction (Doc No)</label><input type="text" name="jmCount">
            <label>Articles from List (Doc No)</label><input type="text" name="articles">
            <label>Negative Count Correction (Doc No)</label><input type="text" name="negCount">
            <label>F&V Dump (Doc No)</label><input type="text" name="fvDump">
        </div>
        <div class="section-card">
            <span class="deadline-badge">12 PM</span>
            <h3>Deadline : 12 PM</h3>
            <label>Reattempt Clearance</label><select name="reattempt"><option value="">Pending</option><option>Done</option></select>
            <label>CN Clearance</label><select name="cnClearance"><option value="">Pending</option><option>Done</option></select>
            <label>JM Order Clearance</label><select name="jmOrder"><option value="">Pending</option><option>Done</option></select>
            <label>BOC Login</label><select name="bocLogin"><option value="">Pending</option><option>Done</option></select>
            <label>DFB Indent</label><select name="dfbIndent"><option value="">Pending</option><option>Done</option></select>
            <label>PIS (Doc No)</label><input type="text" name="pis">
            <label>F&V Indent (Doc No)</label><input type="text" name="fvIndent">
        </div>
        <div class="section-card">
            <span class="deadline-badge">3 PM - 6 PM</span>
            <h3>Deadline : 3 PM - 6 PM</h3>
            <label>On Shelf Availability Evening</label><select name="osaEvening"><option value="">Pending</option><option>Done</option></select>
            <label>Near Expiry Check</label><select name="nearExpiry"><option value="">Pending</option><option>Done</option></select>
            <label>Non F&V Dump (Doc No)</label><input type="text" name="nonFvDump">
            <label>Daily Self Help (Enter no of Bays)</label><input type="text" name="selfHelp">
        </div>
        <div class="section-card">
            <span class="deadline-badge">EOD</span>
            <h3>Deadline : EOD</h3>
            <label>Pending GRN</label><select name="pendingGrn"><option value="">Pending</option><option>Done</option></select>
            <label>EOD Cash Reco</label><select name="cashReco"><option value="">Pending</option><option>Done</option></select>
        </div>
        <div id="tueGroup" class="section-card" style="display:none; border: 2.5px solid var(--danger);">
            <span class="deadline-badge">TUESDAY ONLY</span>
            <h3 style="color:var(--danger)">Weekly Inventory (PI)</h3>
            <label>F&V PI (Posting Doc No)</label><input type="text" name="fvPi">
            <label>Crate PI (Posting Doc No)</label><input type="text" name="cratePi">
            <label>Consumable PI (Posting Doc No)</label><input type="text" name="consumablePi">
        </div>
        <button type="submit" id="submitBtn">SUBMIT ACTIVITIES</button>
    </form>
</div> 
<div id="db" class="tab-content">
    <div id="adminControls">
        <label style="margin-top:0; display:inline-block; font-size: 1rem; color: var(--danger);"><strong>Select Historical Date:</strong></label>
        <select id="historyDateSelect" onchange="loadDashboard('admin')"></select>
    </div>
    <div class="db-controls">
        <div class="filter-group">
            <label>🎯 Filter & Sort Dashboard</label>
            <select id="statusFilter" onchange="applyUIfilter()">
                <option value="all">Full Dashboard (Show All)</option>
                <option value="max_pending">Maximum Pending (Sort Max to Min)</option>
                <option value="pending_10am">Pending: 10 AM DEADLINE</option>
                <option value="pending_12pm">Pending: 12 PM DEADLINE</option>
                <option value="pending_3pm">Pending: 3 PM - 6 PM DEADLINE</option>
                <option value="pending_eod">Pending: EOD DEADLINE</option>
                <option value="pending_tue" id="tuesdayOption" style="display:none;">Pending: TUESDAY ONLY</option>
            </select>
        </div>
        <button id="exportBtn" class="export-btn" onclick="exportLandscapeReport()">EXPORT REPORT</button>
    </div>
    <div class="table-wrapper">
        <div id="capture-area">
            <h1 id="reportTitle" style="margin: 0 0 5px 0; color: #1e293b; font-size: 1.6rem;">Store Operations Performance</h1>
            <p id="subTitle" style="margin-top: 0; color: #64748b; font-weight: 600;">Full System Landscape View</p>
            <table>
                <thead>
                    <tr id="groupHead"></tr> 
                    <tr id="masterHead"></tr>
                </thead>
                <tbody id="masterBody"></tbody>
            </table>
            <p id="exportTime" style="font-size: 12px; color:#94a3b8; margin-top: 20px; font-weight: bold;"></p>
        </div>
    </div>
</div>
<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbx2syCRMFY4Iu3tyFqsTjd9wxmS_UgBsfOcIjbMAVP3GQFVQET6tgPoV1llPK-SrpiMnA/exec';
    let globalAdminPin = ""; let isAdminAuthorized = false; let currentGlobalData = null;

    // 📞 Store → Mobile number mapping
    const storeMobileMap = {
        "TK5T": "6290823675",
        "TM4T": "8013694226",

        "TM6O": "9641498016",

    };

    // 🏬 Store → Name mapping
    const storeNameMap = {
        "TK5T": "Gulshan Colony",
        "TM4T": "Shalimar Rd",
        "TM3J": "Vivekananda Park",
        "TM6O": "Hridaypur",
        "TM6N": "Salt Lake",
        "TM4Z": "Shukhobri",
        "TM6M": "Mullen Stree",
        "TM5C": "Bonhoghly",

        "U949": "Chinsurah",

        "U1WP": "Dunlop",

        "FRVE": "Sadar Bazar",
        "U1L2": "Puratan Bazaar",
        "U14V": "Sonnet Sonar Apar",
        "3035": "Budgebudge",
        "3087": "Netaji Nagar",
        "F1ZP": "Garden Reach",
        "2314": "Jodhpur Park",
        "U1OW": "RN Mukherjee Road",
        "TNI6": "Megh Bristhi",
        "TKM7": "Sushma Apt Baguihati",
        "U086": "New Barrackpur"
    };

    window.onload = () => { 
        const isTuesday = new Date().getDay() === 2;
        if (isTuesday) document.getElementById('tueGroup').style.display = 'block'; 
        document.getElementById('tuesdayOption').style.display = isTuesday ? '' : 'none';

        const select = document.getElementById('historyDateSelect');
        for (let i = 1; i <= 15; i++) {
            let d = new Date(); d.setDate(d.getDate() - i);
            let mm = String(d.getMonth() + 1).padStart(2, '0'); let dd = String(d.getDate()).padStart(2, '0');
            let opt = document.createElement('option'); opt.value = `${d.getFullYear()}-${mm}-${dd}`; 
            opt.text = d.toLocaleDateString(undefined, { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
            select.appendChild(opt);
        }
    };

    function checkAccessAndShow() {
        if (!isAdminAuthorized) {
            document.getElementById('passwordModal').style.display = 'flex';
            document.getElementById('adminPasscode').value = ''; document.getElementById('adminPasscode').focus();
        } else { showTab('db', 'admin'); }
    }
    function closePasswordModal() { document.getElementById('passwordModal').style.display = 'none'; }
    function submitPassword() {
        const passcode = document.getElementById('adminPasscode').value;
        if (passcode) { globalAdminPin = passcode; isAdminAuthorized = true; closePasswordModal(); showTab('db', 'admin'); }
    }
    document.getElementById('adminPasscode').addEventListener('keypress', (e) => { if (e.key === 'Enter') submitPassword(); });

    function showTab(id, viewMode = 'today') {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if (id === 'form') document.getElementById('btn-form').classList.add('active');
        if (id === 'db' && viewMode === 'today') document.getElementById('btn-today').classList.add('active');
        if (id === 'db' && viewMode === 'admin') document.getElementById('btn-admin').classList.add('active');
        if(id === 'db') loadDashboard(viewMode);
    }

    async function loadDashboard(viewMode) {
        const tbody = document.getElementById('masterBody');
        const adminControls = document.getElementById('adminControls');
        const exportBtn = document.getElementById('exportBtn');
        document.getElementById('statusFilter').value = 'all';
        exportBtn.disabled = true; exportBtn.innerText = "⏳ LOADING DATA...";
        let fetchURL = scriptURL + "?view=" + viewMode;
        let targetDateObj = new Date();
        if (viewMode === 'admin') {
            adminControls.style.display = 'block';
            const selectedStr = document.getElementById('historyDateSelect').value;
            fetchURL += `&pin=${encodeURIComponent(globalAdminPin)}&date=${selectedStr}`;
            const [y, m, d] = selectedStr.split('-'); targetDateObj = new Date(y, m - 1, d); 
        } else { adminControls.style.display = 'none'; }
        tbody.innerHTML = '<tr><td colspan="25" style="text-align:center; padding: 20px;">Fetching logs from Google...</td></tr>';
        try {
            const res = await fetch(fetchURL);
            currentGlobalData = await res.json();
            if (currentGlobalData.error) { isAdminAuthorized = false; alert("❌ " + currentGlobalData.error); return; }
            renderTable(targetDateObj);
        } catch(e) { tbody.innerHTML = '<tr><td>Connection Error.</td></tr>'; }
    }

    function applyUIfilter() {
        if(!currentGlobalData) return;
        let dateObj = new Date();
        if(document.getElementById('adminControls').style.display === 'block') {
            const [y, m, d] = document.getElementById('historyDateSelect').value.split('-'); dateObj = new Date(y, m - 1, d);
        }
        renderTable(dateObj);
    }

    function renderTable(targetDateObj) {
        const headers = currentGlobalData[0];
        const rows = currentGlobalData.slice(1); 
        const isTargetTuesday = targetDateObj.getDay() === 2;
        const filterVal = document.getElementById('statusFilter').value;
        const allStores = Array.from(document.getElementById('storeDropdown').options).map(opt => opt.value).filter(val => val !== "");
        
        let storeDataMap = {};
        allStores.forEach(store => { 
            storeDataMap[store] = new Array(headers.length).fill("❌ Pending"); 
            storeDataMap[store][1] = store; 
        });
        rows.forEach(row => {
            const store = row[1]; if (!store) return;
            if (!storeDataMap[store]) { storeDataMap[store] = new Array(headers.length).fill("❌ Pending"); storeDataMap[store][1] = store; }
            for (let i = 2; i < headers.length; i++) {
                if (row[i] !== undefined && row[i] !== "" && String(row[i]).trim() !== "") storeDataMap[store][i] = row[i];
            }
        });

        const idxStore = [1];
        const idx10am = [2, 3, 4, 5, 16, 17, 18, 6];
        const idx12pm = [7, 8, 9, 10, 11, 12, 13];
        const idx3pm  = [14, 15, 19, 20];
        const idxEod  = [21, 22];
        const idxTue  = [23, 24, 25];

        let activeIndices = [...idxStore];
        if (['all', 'max_pending'].includes(filterVal)) {
            activeIndices = activeIndices.concat(idx10am, idx12pm, idx3pm, idxEod);
            if (isTargetTuesday) activeIndices = activeIndices.concat(idxTue);
        } 
        else if (filterVal === 'pending_10am') activeIndices = activeIndices.concat(idx10am);
        else if (filterVal === 'pending_12pm') activeIndices = activeIndices.concat(idx12pm);
        else if (filterVal === 'pending_3pm') activeIndices = activeIndices.concat(idx3pm);
        else if (filterVal === 'pending_eod') activeIndices = activeIndices.concat(idxEod);
        else if (filterVal === 'pending_tue') activeIndices = activeIndices.concat(idxTue);

        const isP = (val) => String(val).includes('❌ Pending');

        let finalRows = allStores.map(store => {
            const row = storeDataMap[store];
            return activeIndices.map(i => {
                let val = row[i];
                let displayVal = (!val || val === 0 || val === "❌ Pending") ? "❌ Pending" : val;
                if (String(headers[i]).includes("(Tue)")) displayVal = isTargetTuesday ? displayVal : "—";
                return displayVal;
            });
        });

        if (filterVal === 'all') { /* show all */ }
        else if (filterVal === 'max_pending') {
            finalRows.sort((a, b) => b.filter(isP).length - a.filter(isP).length);
        } else {
            finalRows = finalRows
                .filter(row => row.slice(1).some(isP))
                .sort((a, b) => b.filter(isP).length - a.filter(isP).length);
        }

        let groupHTML = `<th class="group-header" style="background: white;"></th>`;
        if (['all', 'max_pending'].includes(filterVal)) {
            groupHTML += `<th colspan="8" class="group-header" style="background: #e0f2fe; color: #0369a1;">10 AM</th>
                          <th colspan="7" class="group-header" style="background: #fef08a; color: #854d0e;">12 PM</th>
                          <th colspan="4" class="group-header" style="background: #ffedd5; color: #c2410c;">3-6 PM</th>
                          <th colspan="2" class="group-header" style="background: #e2e8f0; color: #334155;">EOD</th>`;
            if (isTargetTuesday) groupHTML += `<th colspan="3" class="group-header" style="background: #fee2e2; color: #991b1b;">TUE</th>`;
        } else if (filterVal === 'pending_10am') groupHTML += `<th colspan="8" class="group-header" style="background: #e0f2fe; color: #0369a1;">10 AM PENDING</th>`;
        else if (filterVal === 'pending_12pm') groupHTML += `<th colspan="7" class="group-header" style="background: #fef08a; color: #854d0e;">12 PM PENDING</th>`;
        else if (filterVal === 'pending_3pm') groupHTML += `<th colspan="4" class="group-header" style="background: #ffedd5; color: #c2410c;">3-6 PM PENDING</th>`;
        else if (filterVal === 'pending_eod') groupHTML += `<th colspan="2" class="group-header" style="background: #e2e8f0; color: #334155;">EOD PENDING</th>`;
        else if (filterVal === 'pending_tue') groupHTML += `<th colspan="3" class="group-header" style="background: #fee2e2; color: #991b1b;">TUE PENDING</th>`;

        document.getElementById('groupHead').innerHTML = groupHTML;
        document.getElementById('masterHead').innerHTML = activeIndices.map(i => `<th>${headers[i]}</th>`).join('');
        document.getElementById('masterBody').innerHTML = finalRows.map(r => {
            const count = r.filter(isP).length;
            const storeCode = r[0];
            const mobile = storeMobileMap[storeCode];
            const storeName = storeNameMap[storeCode] || '';
            const label = filterVal !== 'all' ? `${storeCode} (${count})` : storeCode;
            // Use <br> + inline span so html2canvas properly captures the store name
            const nameHTML = storeName ? `<br><span class="store-name">${storeName}</span>` : '';
            const badgeHTML = mobile 
                ? `<a href="tel:${mobile}" class="badge badge-id" style="text-decoration:none; color:inherit;">${label}${nameHTML}</a>`
                : `<span class="badge badge-id">${label}${nameHTML}</span>`;
            return `<tr><td>${badgeHTML}</td>${r.slice(1).map(c => `<td><span class="${getCls(c)}">${c}</span></td>`).join('')}</tr>`;
        }).join('');

        document.getElementById('exportTime').innerText = `Viewing: ${targetDateObj.toLocaleDateString()}`;
        const btn = document.getElementById('exportBtn');
        btn.disabled = false; btn.innerText = "EXPORT REPORT"; btn.style.opacity = "1";
    }

    function getCls(c) {
        if(String(c).includes('Done')) return 'badge bg-done';
        if(String(c).includes('Pending')) return 'badge bg-pending';
        return 'badge badge-id';
    }

    function exportLandscapeReport() {
    const area = document.getElementById('capture-area');
    const btn = document.getElementById('exportBtn');
    const sticky = document.querySelectorAll('td:first-child, th');
    
    // Temporarily remove sticky positioning
    const old = []; 
    sticky.forEach((el, i) => { 
        old[i] = el.style.position; 
        el.style.position = 'static'; 
    });
    
    btn.innerText = "SAVING..."; 
    btn.disabled = true;
    
    // 1. Lower the scale (e.g., to 2 or 1.5)
    // Keep scale at 1.5 or 2 to balance size and clarity
html2canvas(area, { scale: 2.5, useCORS: true }).then(canvas => {
    const link = document.createElement('a'); 
    
    // Switch back to .png
    link.download = `Report_${new Date().toLocaleDateString()}.png`;
    link.href = canvas.toDataURL('image/png'); // Removed JPEG compression
    link.click();
    
    sticky.forEach((el, i) => { el.style.position = old[i] || ''; });
    btn.innerText = "EXPORT REPORT"; 
    btn.disabled = false;
});
}

    document.getElementById('storeForm').addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn'); btn.innerText = "Submitting..."; btn.disabled = true;
        fetch(scriptURL, { method: 'POST', body: new FormData(e.target)})
            .then(() => { alert("Success!"); e.target.reset(); btn.innerText = "SUBMIT ACTIVITIES"; btn.disabled = false; })
            .catch(() => { alert("Error!"); btn.disabled = false; });
    });
</script>
</body>
</html>
